<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>파인만의 답변 — 무엇이든 근본부터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#173a30;
    --board-2:#12302a;
    --chalk:#f2efe4;
    --chalk-dim:#b9c4b3;
    --yellow:#f2c14e;
    --cyan:#8ec6d6;
    --coral:#e88f7a;
    --line:rgba(242,239,228,.22);
    --frame:#5a4326;
    --frame-2:#3d2c18;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Gowun Dodum",system-ui,sans-serif;
    color:var(--chalk);
    background:#0d211c;
    line-height:1.75;
    min-height:100vh;
    padding:clamp(14px,3vw,40px);
    -webkit-font-smoothing:antialiased;
    overflow-y:auto;
  }

  .board{
    max-width:960px;margin:0 auto;
    background:
      radial-gradient(120% 80% at 20% 0%, rgba(255,255,255,.05), transparent 60%),
      radial-gradient(100% 60% at 80% 100%, rgba(0,0,0,.25), transparent 60%),
      var(--board);
    border-radius:6px;
    border:14px solid var(--frame);
    box-shadow:
      0 0 0 3px var(--frame-2),
      0 30px 70px rgba(0,0,0,.55),
      inset 0 0 120px rgba(0,0,0,.4);
    position:relative;
    overflow:visible;
  }
  .board::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:
      radial-gradient(1px 1px at 12% 30%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 68% 12%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 40% 78%, rgba(255,255,255,.25), transparent),
      radial-gradient(1px 1px at 88% 60%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,.2), transparent);
  }
  .inner{position:relative;z-index:1;padding:clamp(22px,4.5vw,52px)}

  header{text-align:center;padding-bottom:8px}
  .kicker{
    font-family:"Space Mono",monospace;font-size:.72rem;letter-spacing:.32em;
    color:var(--cyan);text-transform:uppercase;margin-bottom:10px;opacity:.9;
  }
  h1{
    font-family:"Gaegu",cursive;font-weight:700;
    font-size:clamp(2.6rem,9vw,4.4rem);line-height:.95;
    text-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .squiggle{display:block;margin:6px auto 14px;width:min(320px,70%);height:20px}
  .squiggle path{
    fill:none;stroke:var(--yellow);stroke-width:2.4;stroke-linecap:round;
    stroke-dasharray:600;stroke-dashoffset:600;
    animation:draw 1.6s ease forwards .2s;
  }
  @keyframes draw{to{stroke-dashoffset:0}}
  .tagline{
    font-family:"Gaegu",cursive;font-size:clamp(1.05rem,3.4vw,1.4rem);
    color:var(--chalk-dim);
  }
  .boot-err{
    display:none;margin:16px auto;max-width:640px;padding:16px 20px;
    background:rgba(232,143,122,.15);border:1.5px solid var(--coral);
    border-radius:8px;color:var(--chalk);font-size:.92rem;line-height:1.6;
  }
  .boot-err.on{display:block}
  .boot-err b{color:var(--yellow)}

  /* 명언 · 핵심용어 · 노하우 */
  .wisdom-nav{margin-top:clamp(18px,3.5vw,28px);display:flex;flex-direction:column;gap:8px;overflow-anchor:none}
  .wisdom-block{display:flex;flex-direction:column;gap:4px}
  .wisdom-toggle{
    width:100%;text-align:left;font-family:"Gaegu",cursive;font-weight:700;
    font-size:clamp(1.1rem,3.5vw,1.35rem);color:var(--chalk);
    background:rgba(0,0,0,.14);border:1.5px solid var(--line);border-radius:10px;
    padding:12px 16px;cursor:pointer;display:flex;align-items:center;
    justify-content:space-between;gap:12px;transition:background .2s,border-color .2s;
    scroll-margin-top:16px;
    scroll-margin-bottom:8px;
  }
  .wisdom-toggle:hover{background:rgba(255,255,255,.06);border-color:var(--chalk-dim)}
  .wisdom-toggle.open{border-color:var(--yellow);background:rgba(242,193,78,.08)}
  .wisdom-toggle .w-label{display:flex;align-items:center;gap:10px}
  .wisdom-toggle .w-icon{font-size:1.3rem;flex-shrink:0}
  .wisdom-toggle .w-count{
    font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.1em;
    color:var(--cyan);flex-shrink:0;
  }
  .wisdom-toggle .w-arrow{
    font-size:.85rem;color:var(--chalk-dim);transition:transform .2s;
  }
  .wisdom-toggle.open .w-arrow{transform:rotate(180deg);color:var(--yellow)}
  .wisdom-panel{
    display:none;padding:8px 4px 4px;
  }
  .wisdom-panel.on{display:block}
  .wisdom-list{display:flex;flex-wrap:wrap;gap:7px}
  .wisdom-item{
    font-family:inherit;font-size:.84rem;color:var(--chalk);
    background:rgba(255,255,255,.04);border:1px solid var(--line);
    border-radius:18px;padding:6px 12px;cursor:pointer;
    transition:background .2s,border-color .2s,transform .1s;
    max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .wisdom-item:hover{background:rgba(255,255,255,.09);border-color:var(--yellow)}
  .wisdom-item:active{transform:scale(.97)}
  .wisdom-item.quote-item{border-left:2px solid var(--cyan);border-radius:0 18px 18px 0}
  .wisdom-item.term-item b{color:var(--yellow);font-weight:700}
  .wisdom-item.knowhow-item{border-color:rgba(142,198,214,.4)}
  .wisdom-item.story-item{border-left:2px solid var(--coral);border-radius:0 18px 18px 0}

  .modal.story-modal,.modal.knowhow-modal{max-width:900px}

  /* 팝업 모달 */
  .modal-overlay{
    display:none;position:fixed;inset:0;z-index:1000;
    background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
    align-items:center;justify-content:center;padding:12px;
  }
  .modal-overlay.on{display:flex}
  .modal{
    background:var(--board);border:3px solid var(--frame);
    border-radius:12px;max-width:780px;width:100%;max-height:96vh;
    overflow:hidden;padding:16px 20px 14px;position:relative;
    box-shadow:0 24px 80px rgba(0,0,0,.65);
    animation:modalIn .25s ease;
    display:flex;flex-direction:column;
  }
  .modal.wisdom-modal{max-width:820px}
  .modal.answer-modal{max-width:760px}
  @keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .modal-close{
    position:absolute;top:6px;right:8px;font-size:1.35rem;line-height:1;
    color:var(--chalk-dim);background:transparent;border:0;cursor:pointer;
    padding:2px 7px;border-radius:6px;transition:color .2s,background .2s;z-index:2;
  }
  .modal-close:hover{color:var(--chalk);background:rgba(255,255,255,.08)}
  .modal h3{
    font-family:"Gaegu",cursive;font-size:var(--m-h3,clamp(1.2rem,3.6vw,1.55rem));
    color:var(--yellow);line-height:1.2;margin-bottom:3px;padding-right:30px;flex:0 0 auto;
  }
  .modal .m-sub{
    font-family:"Space Mono",monospace;font-size:.64rem;letter-spacing:.08em;
    color:var(--cyan);margin-bottom:8px;line-height:1.4;flex:0 0 auto;
  }
  .modal .m-body{
    font-size:var(--m-fs,1.02rem);color:#e7e3d6;line-height:var(--m-lh,1.5);
    white-space:pre-wrap;flex:1 1 auto;min-height:0;overflow:hidden;
  }
  .modal .m-body .m-section{
    display:block;margin-top:var(--m-gap,8px);padding-top:var(--m-gap,8px);
    border-top:1px solid var(--line);
  }
  .modal .m-body .m-section:first-child{margin-top:0;padding-top:0;border-top:0}
  .modal .m-search{
    margin-top:10px;font-family:"Gaegu",cursive;font-size:.95rem;
    color:var(--board);background:var(--cyan);border:0;border-radius:8px;
    padding:6px 16px;cursor:pointer;transition:background .2s;flex:0 0 auto;align-self:flex-start;
  }
  .modal .m-search:hover{background:#a8d8e4}

  /* 검색 모드: 메인 화면은 유지, 진행 중 화면만 숨김 */
  body.searching #viewTopic,
  body.searching #answer,
  body.searching #loading{display:none !important}
  body.searching .search-hint{color:var(--cyan)}
  .search-empty{
    font-family:"Gaegu",cursive;font-size:1.05rem;color:var(--chalk-dim);
    padding:16px 0;text-align:center;
  }

  .ask{margin-top:clamp(26px,5vw,40px)}
  .field{
    background:rgba(0,0,0,.18);
    border:1.5px dashed var(--line);
    border-radius:10px;padding:6px;
    transition:border-color .25s;
  }
  .field:focus-within{border-color:var(--yellow)}
  textarea{
    width:100%;background:transparent;border:0;resize:none;
    color:var(--chalk);font-family:inherit;font-size:1.12rem;line-height:1.6;
    padding:14px 16px;min-height:64px;
  }
  textarea::placeholder{color:rgba(185,196,179,.6)}
  textarea:focus{outline:none}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;
    margin-top:8px;flex-wrap:wrap}
  .hint{font-family:"Space Mono",monospace;font-size:.7rem;color:var(--chalk-dim);
    letter-spacing:.05em}
  .ask-btn{
    font-family:"Gaegu",cursive;font-weight:700;font-size:1.25rem;
    color:var(--board);background:var(--yellow);
    border:0;border-radius:8px;padding:9px 26px;cursor:pointer;
    box-shadow:0 3px 0 #b98f2c;transition:transform .12s, box-shadow .12s, background .2s;
  }
  .ask-btn:hover{background:#f6cd6b}
  .ask-btn:active{transform:translateY(3px);box-shadow:0 0 0 #b98f2c}
  .ask-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:0 3px 0 #b98f2c}

  .examples{margin-top:22px}
  .examples-label{
    font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.2em;
    color:var(--chalk-dim);text-transform:uppercase;margin-bottom:12px;
  }

  /* 검색 */
  .search-wrap{margin-top:clamp(20px,4vw,32px)}
  .search-input{
    width:100%;background:rgba(0,0,0,.18);border:1.5px dashed var(--line);
    border-radius:10px;color:var(--chalk);font-family:inherit;font-size:1.05rem;
    padding:14px 16px;transition:border-color .25s;
  }
  .search-input:focus{outline:none;border-color:var(--yellow)}
  .search-input::placeholder{color:rgba(185,196,179,.6)}
  .search-hint{
    font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.05em;
    color:var(--chalk-dim);margin-top:8px;
  }

  /* 주제 그리드 */
  .topic-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:10px;margin-top:18px;
  }
  .topic-card{
    text-align:left;background:rgba(255,255,255,.04);border:1.5px solid var(--line);
    border-radius:12px;padding:16px 18px;cursor:pointer;
    transition:background .2s,border-color .2s,transform .12s,opacity .2s;
  }
  .topic-card:hover{background:rgba(255,255,255,.09);border-color:var(--chalk-dim)}
  .topic-card:active{transform:scale(.98)}
  .topic-card.dim{opacity:.32;pointer-events:none}
  .topic-card.match{border-color:var(--yellow);background:rgba(242,193,78,.08)}
  .topic-card .t-emoji{font-size:1.6rem;margin-bottom:6px}
  .topic-card .t-name{
    font-family:"Gaegu",cursive;font-size:1.35rem;font-weight:700;
    color:var(--chalk);margin-bottom:4px;
  }
  .topic-card .t-desc{font-size:.88rem;color:var(--chalk-dim);line-height:1.5}
  .topic-card .t-count{
    font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.08em;
    color:var(--cyan);margin-top:10px;
  }

  /* 주제 상세 */
  .view-topic{display:none;margin-top:clamp(20px,4vw,32px)}
  .view-topic.on{display:block}
  .back-btn{
    font-family:"Gaegu",cursive;font-size:1.05rem;color:var(--cyan);
    background:transparent;border:1px dashed var(--line);border-radius:8px;
    padding:8px 16px;cursor:pointer;margin-bottom:18px;
    transition:border-color .2s,color .2s;
  }
  .back-btn:hover{border-color:var(--cyan);color:var(--chalk)}
  .topic-head{margin-bottom:20px}
  .topic-head .t-emoji{font-size:2rem;margin-bottom:4px}
  .topic-head h2{
    font-family:"Gaegu",cursive;font-size:clamp(1.8rem,5vw,2.4rem);
    color:var(--yellow);margin-bottom:6px;
  }
  .topic-head p{color:var(--chalk-dim);font-size:.95rem}

  /* 질문 목록 */
  .q-list{display:flex;flex-direction:column;gap:8px}
  .q-item{
    text-align:left;background:rgba(0,0,0,.12);border:1px solid var(--line);
    border-radius:10px;padding:12px 16px;cursor:pointer;
    display:flex;align-items:flex-start;gap:12px;
    transition:background .2s,border-color .2s,transform .1s;
  }
  .q-item:hover{background:rgba(255,255,255,.06);border-color:var(--chalk-dim)}
  .q-item:active{transform:scale(.99)}
  .q-item.match{border-color:var(--yellow);background:rgba(242,193,78,.06)}
  .q-item.dim{opacity:.32;pointer-events:none}
  .q-item .q-num{
    font-family:"Space Mono",monospace;font-size:.72rem;color:var(--board);
    background:var(--chalk);border-radius:50%;width:24px;height:24px;
    display:grid;place-items:center;flex-shrink:0;font-weight:700;
  }
  .q-item .q-text{font-size:.98rem;color:#e7e3d6;line-height:1.5}

  /* 검색 결과 */
  .search-results{display:none;margin-top:18px}
  .search-results.on{display:block}
  .search-results h3{
    font-family:"Gaegu",cursive;font-size:1.2rem;color:var(--cyan);
    margin-bottom:12px;
  }
  .search-group{margin-bottom:20px}
  .search-group-title{
    font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.12em;
    color:var(--chalk-dim);text-transform:uppercase;margin-bottom:8px;
  }

  .view-home.on{display:block}
  .view-home{display:block}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{
    font-family:inherit;font-size:.92rem;color:var(--chalk);
    background:rgba(255,255,255,.04);border:1px solid var(--line);
    border-radius:20px;padding:7px 14px;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    transition:background .2s,border-color .2s,transform .1s;
  }
  .chip:hover{background:rgba(255,255,255,.09);border-color:var(--chalk-dim)}
  .chip:active{transform:scale(.97)}
  .chip .cat{
    font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.05em;
    color:var(--board);background:var(--cyan);border-radius:4px;padding:1px 5px;
  }

  .answer{margin-top:clamp(30px,5vw,44px);display:none}
  .answer.on{display:block}
  .divider{width:100%;height:14px;margin:2px 0 22px}
  .divider path{fill:none;stroke:var(--line);stroke-width:1.6;stroke-linecap:round}

  .q-echo{
    font-family:"Gaegu",cursive;font-size:clamp(1.4rem,4.5vw,1.9rem);
    color:var(--yellow);line-height:1.2;margin-bottom:6px;
  }
  .q-cat{font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.15em;
    color:var(--cyan);text-transform:uppercase;margin-bottom:26px}

  .block{margin-bottom:26px;opacity:0;transform:translateY(8px);
    animation:rise .5s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .block .b-label{
    font-family:"Gaegu",cursive;font-weight:700;font-size:1.35rem;
    color:var(--chalk);margin-bottom:6px;display:flex;align-items:center;gap:9px;
  }
  .block .b-label .num{
    font-family:"Space Mono",monospace;font-size:.85rem;color:var(--board);
    background:var(--chalk);border-radius:50%;width:26px;height:26px;
    display:grid;place-items:center;font-weight:700;flex-shrink:0;
  }
  .block .b-body{font-size:1.06rem;color:#e7e3d6;white-space:pre-wrap}
  .block.core .b-body{
    font-family:"Gaegu",cursive;font-size:1.5rem;line-height:1.35;color:#fff;
  }
  .block.honest{
    background:rgba(232,143,122,.08);border-left:3px solid var(--coral);
    padding:16px 18px;border-radius:0 8px 8px 0;
  }
  .block.honest .b-label{color:var(--coral)}
  .block.honest .b-label .num{background:var(--coral)}

  .redo{
    display:inline-flex;align-items:center;gap:8px;margin-top:6px;
    font-family:"Gaegu",cursive;font-size:1.05rem;color:var(--cyan);
    background:transparent;border:1px dashed var(--line);border-radius:8px;
    padding:8px 16px;cursor:pointer;transition:border-color .2s,color .2s;
  }
  .redo:hover{border-color:var(--cyan);color:var(--chalk)}

  .loading{display:none;margin-top:34px;text-align:center}
  .loading.on{display:block}
  .chalk-dots{display:inline-flex;gap:7px;margin-bottom:14px}
  .chalk-dots span{width:9px;height:9px;border-radius:50%;background:var(--chalk);
    animation:blink 1.1s infinite ease-in-out}
  .chalk-dots span:nth-child(2){animation-delay:.18s}
  .chalk-dots span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .loading-msg{font-family:"Gaegu",cursive;font-size:1.2rem;color:var(--chalk-dim)}

  .err{
    display:none;margin-top:26px;color:var(--coral);
    background:rgba(232,143,122,.08);border:1px solid rgba(232,143,122,.3);
    border-radius:8px;padding:16px 18px;font-size:.98rem;line-height:1.6;
  }
  .err.on{display:block}

  footer{
    text-align:center;margin-top:34px;padding-top:20px;border-top:1px solid var(--line);
    font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.05em;
    color:var(--chalk-dim);line-height:1.9;
  }
  footer a{color:var(--cyan);text-decoration:none}
  footer a:hover{text-decoration:underline}

  @media (max-width:520px){
    .board{border-width:10px}
    .ask-btn{width:100%}
    .row{justify-content:center}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important}
    .squiggle path{stroke-dashoffset:0}
    .block{opacity:1;transform:none}
  }
</style>
</head>
<body>
  <div class="board">
    <div class="inner">
      <div class="boot-err" id="bootErr" role="alert"></div>
      <header>
        <div class="kicker">The pleasure of finding things out</div>
        <h1>파인만의 답변</h1>
        <svg class="squiggle" viewBox="0 0 320 20" aria-hidden="true">
          <path d="M2,10 Q18,-4 34,10 T66,10 T98,10 T130,10 T162,10 T194,10 T226,10 T258,10 T290,10 T318,10"/>
        </svg>
        <p class="tagline">이름을 아는 것과 <b>진짜로 아는 것</b>은 다릅니다.<br/>50개 주제 · 주제당 50문항 · 2,500개의 답</p>
      </header>

      <nav class="wisdom-nav" aria-label="파인만 지혜">
        <div class="wisdom-block" id="quotesBlock">
          <button type="button" class="wisdom-toggle" id="toggleQuotes" aria-expanded="false">
            <span class="w-label"><span class="w-icon">💬</span>파인만의 명언</span>
            <span class="w-count">100</span><span class="w-arrow">▼</span>
          </button>
          <div class="wisdom-panel" id="quotesPanel"><div class="wisdom-list" id="quotesEl"></div></div>
        </div>

        <div class="wisdom-block" id="termsBlock">
          <button type="button" class="wisdom-toggle" id="toggleTerms" aria-expanded="false">
            <span class="w-label"><span class="w-icon">🔑</span>핵심 용어</span>
            <span class="w-count">100</span><span class="w-arrow">▼</span>
          </button>
          <div class="wisdom-panel" id="termsPanel"><div class="wisdom-list" id="termsEl"></div></div>
        </div>

        <div class="wisdom-block" id="knowhowBlock">
          <button type="button" class="wisdom-toggle" id="toggleKnowhow" aria-expanded="false">
            <span class="w-label"><span class="w-icon">🧠</span>파인만의 노하우</span>
            <span class="w-count">100</span><span class="w-arrow">▼</span>
          </button>
          <div class="wisdom-panel" id="knowhowPanel"><div class="wisdom-list" id="knowhowEl"></div></div>
        </div>

        <div class="wisdom-block" id="storiesBlock">
          <button type="button" class="wisdom-toggle" id="toggleStories" aria-expanded="false">
            <span class="w-label"><span class="w-icon">📖</span>파인만의 일화</span>
            <span class="w-count">200</span><span class="w-arrow">▼</span>
          </button>
          <div class="wisdom-panel" id="storiesPanel"><div class="wisdom-list" id="storiesEl"></div></div>
        </div>
      </nav>

      <section class="search-wrap">
        <input type="search" class="search-input" id="searchInput"
          placeholder="검색: 죽음, 생명, 물, 걷기, 파인만…" autocomplete="off" />
        <p class="search-hint" id="searchHint">단어를 입력하면 맞는 카테고리만 표시되고, 질문은 팝업으로 열립니다</p>
      </section>

      <section class="view-home on" id="viewHome">
        <div class="examples-label" id="examplesLabel" style="margin-top:22px">50개 카테고리 · 클릭하여 50문항 탐색</div>
        <div class="topic-grid" id="topicGrid"></div>
        <div class="search-results" id="searchResults"></div>
      </section>

      <section class="view-topic" id="viewTopic">
        <button class="back-btn" id="backBtn">← 주제 목록으로</button>
        <div class="topic-head" id="topicHead"></div>
        <div class="q-list" id="questionList"></div>
      </section>

      <div class="loading" id="loading">
        <div class="chalk-dots"><span></span><span></span><span></span></div>
        <div class="loading-msg" id="loadingMsg">칠판 앞에 섭니다…</div>
      </div>

      <div class="err" id="err"></div>

      <section class="answer" id="answer">
        <svg class="divider" viewBox="0 0 800 14" preserveAspectRatio="none" aria-hidden="true">
          <path d="M2,7 Q40,0 80,7 T160,7 T240,7 T320,7 T400,7 T480,7 T560,7 T640,7 T720,7 T798,7"/>
        </svg>
        <div class="q-echo" id="qEcho"></div>
        <div class="q-cat" id="qCat"></div>
        <div id="blocks"></div>
        <button class="redo" id="redo">↺ 목록으로 돌아가기</button>
      </section>

      <footer>
        RICHARD P. FEYNMAN · 1918–1988<br/>
        파인만의 사고법을 흉내 낸 학습용 도구입니다 · 의학·법률 판단은 전문가와 상의하세요<br/>
        <a href="https://www.feynmanlectures.caltech.edu/" target="_blank" rel="noopener">파인만의 물리학 강의 (Caltech)</a>
      </footer>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modalBox">
      <button class="modal-close" id="modalClose" aria-label="닫기">×</button>
      <h3 id="modalTitle"></h3>
      <div class="m-sub" id="modalSub"></div>
      <div class="m-body" id="modalBody"></div>
      <button class="m-search" id="modalSearch">관련 질문 검색하기</button>
    </div>
  </div>

<script>
/* 토글 UI — 데이터 로드 전에도 클릭·열기/닫기 동작 */
(function(){
  function closePanel(btn, panel){
    btn.classList.remove("open");
    btn.setAttribute("aria-expanded","false");
    panel.classList.remove("on");
  }
  document.querySelectorAll(".wisdom-toggle").forEach(btn=>{
    const panel = btn.parentElement && btn.parentElement.querySelector(".wisdom-panel");
    if(!panel) return;
    btn.addEventListener("click", ()=>{
      if(btn.classList.contains("open")){
        closePanel(btn, panel);
        return;
      }
      document.querySelectorAll(".wisdom-toggle").forEach(b=>{
        const p = b.parentElement && b.parentElement.querySelector(".wisdom-panel");
        if(p && b !== btn) closePanel(b, p);
      });
      btn.classList.add("open");
      btn.setAttribute("aria-expanded","true");
      panel.classList.add("on");
    });
  });
})();
</script>
<script src="knowledge-data.js" id="dataScript"></script>
<script>
function showBootError(msg){
  const el=document.getElementById("bootErr");
  if(!el) return;
  el.innerHTML=msg;
  el.classList.add("on");
}
function safeOn(el, ev, fn){
  if(el) el.addEventListener(ev, fn);
}
function dataReady(){
  return typeof TOPICS!=="undefined" && Array.isArray(TOPICS) && TOPICS.length>0;
}

function main(){
const BLOCK_DEF = [
  {key:"core",      label:"한 줄로 말하면",     cls:"core"},
  {key:"mechanism", label:"근본부터 보면",       cls:""},
  {key:"analogy",   label:"그림으로 그려보면",   cls:""},
  {key:"sofar",     label:"그래서, 무엇을 할까", cls:""},
  {key:"honest",    label:"솔직히 말하면",       cls:"honest"},
];

const LOADING_MSGS = [
  "칠판 앞에 섭니다…","분필을 집어 듭니다…","근본부터 다시 생각합니다…",
  "이름이 아니라 메커니즘을 봅니다…","비유를 하나 그려봅니다…",
];

const $ = s => document.querySelector(s);
const searchInput = $("#searchInput");
const quotesEl = $("#quotesEl");
const termsEl = $("#termsEl");
const knowhowEl = $("#knowhowEl");
const storiesEl = $("#storiesEl");
const toggleQuotes = $("#toggleQuotes");
const toggleTerms = $("#toggleTerms");
const toggleKnowhow = $("#toggleKnowhow");
const toggleStories = $("#toggleStories");
const quotesPanel = $("#quotesPanel");
const termsPanel = $("#termsPanel");
const knowhowPanel = $("#knowhowPanel");
const storiesPanel = $("#storiesPanel");
const modalOverlay = $("#modalOverlay");
const modalBox = $("#modalBox");
const modalTitle = $("#modalTitle");
const modalSub = $("#modalSub");
const modalBody = $("#modalBody");
const modalClose = $("#modalClose");
const modalSearch = $("#modalSearch");
const examplesLabel = $("#examplesLabel");
const searchHint = $("#searchHint");
const topicGrid = $("#topicGrid");
const searchResults = $("#searchResults");
const viewHome = $("#viewHome");
const viewTopic = $("#viewTopic");
const topicHead = $("#topicHead");
const questionList = $("#questionList");
const backBtn = $("#backBtn");
const loadingEl = $("#loading");
const loadingMsg = $("#loadingMsg");
const answerEl = $("#answer");
const qEcho = $("#qEcho");
const qCat = $("#qCat");
const blocksEl = $("#blocks");
const errEl = $("#err");
const redoBtn = $("#redo");

const panelToggles = [
  {btn: document.getElementById("toggleQuotes"), panel: document.getElementById("quotesPanel")},
  {btn: document.getElementById("toggleTerms"), panel: document.getElementById("termsPanel")},
  {btn: document.getElementById("toggleKnowhow"), panel: document.getElementById("knowhowPanel")},
  {btn: document.getElementById("toggleStories"), panel: document.getElementById("storiesPanel")},
];

function closeWisdomPanel(btn, panel){
  if(!btn || !panel) return;
  btn.classList.remove("open");
  btn.setAttribute("aria-expanded","false");
  panel.classList.remove("on");
}

let currentTopicId = null;
let loadingTimer = null;
let searchQuery = "";

function setSearch(q){
  searchQuery = q;
  if(searchInput) searchInput.value = q;
  updateSearchMode();
  if(currentTopicId && !isSearchActive()){
    const topic=getTopicById(currentTopicId);
    if(topic) renderQuestionList(topic);
  }
  const {topics,questions}=searchItems(searchQuery);
  renderTopicGrid(topics);
  renderSearchResults(questions);
}

let modalKeyword = "";

function formatModalBody(text){
  if(!text) return "";
  return escapeHTML(text)
    .replace(/▶ ([^\n]+)/g, '<span class="m-section">▶ $1</span>')
    .replace(/【([^】]+)】/g, '<strong style="color:var(--yellow)">【$1】</strong>');
}

function openModal(title, sub, body, keyword, modalType, hideSearch){
  modalTitle.textContent = title;
  modalSub.textContent = sub || "";
  modalBody.innerHTML = formatModalBody(body || "");
  modalKeyword = keyword || "";
  if(modalBox){
    modalBox.classList.remove("story-modal","wisdom-modal","answer-modal","knowhow-modal");
    if(modalType==="story") modalBox.classList.add("story-modal");
    else if(modalType==="knowhow") modalBox.classList.add("knowhow-modal");
    else if(hideSearch) modalBox.classList.add("answer-modal");
    else modalBox.classList.add("wisdom-modal");
  }
  if(modalSearch) modalSearch.style.display = hideSearch ? "none" : "";
  modalOverlay.classList.add("on");
  document.body.style.overflow = "hidden";
  fitModalContent();
}

function fitModalContent(){
  if(!modalBox || !modalBody) return;
  const styles = ["--m-fs","--m-lh","--m-gap","--m-h3"];
  styles.forEach(v=>modalBox.style.removeProperty(v));

  const steps = [
    {fs:1.02, lh:1.55, gap:8},
    {fs:0.96, lh:1.48, gap:7},
    {fs:0.9,  lh:1.42, gap:6},
    {fs:0.84, lh:1.36, gap:5},
    {fs:0.78, lh:1.3,  gap:4},
    {fs:0.72, lh:1.26, gap:4},
    {fs:0.66, lh:1.22, gap:3},
    {fs:0.6,  lh:1.2,  gap:3},
  ];

  const apply = (s)=>{
    modalBox.style.setProperty("--m-fs", s.fs+"rem");
    modalBox.style.setProperty("--m-lh", s.lh);
    modalBox.style.setProperty("--m-gap", s.gap+"px");
  };

  const fits = ()=> modalBody.scrollHeight <= modalBody.clientHeight + 1;

  let i = 0;
  const tryStep = ()=>{
    apply(steps[i]);
    requestAnimationFrame(()=>{
      if(fits() || i >= steps.length-1){
        if(!fits()) modalBody.style.overflowY = "auto";
        else modalBody.style.overflowY = "hidden";
        return;
      }
      i++;
      tryStep();
    });
  };
  modalBody.style.overflowY = "hidden";
  requestAnimationFrame(tryStep);
}

function formatAnswerBody(data){
  let body = "【파인만의 답변】\n\n";
  BLOCK_DEF.forEach(def=>{
    const txt=(data[def.key]||"").trim();
    if(!txt) return;
    body += `▶ ${def.label}\n${txt}\n\n`;
  });
  body += (
    "▶ 파인만의 교훈\n" +
    "• 이름이 아니라 메커니즘을 보라\n" +
    "• 모르면 모른다고 말하는 것이 과학적 정직\n" +
    "• 조건을 바꾸면 결과가 달라진다\n" +
    "• 이해의 기쁨이 최고의 보상"
  );
  return body;
}

function openAnswerModal(question, answer){
  const body=formatAnswerBody(answer);
  openModal(question, answer.category?`분야 · ${answer.category}`:"", body, "", "answer", true);
}

function isSearchActive(){
  return !!searchQuery.trim();
}

function updateSearchMode(){
  const q=isSearchActive();
  document.body.classList.toggle("searching", q);
  if(examplesLabel){
    examplesLabel.textContent=q
      ? "검색어와 일치하는 카테고리"
      : "50개 카테고리 · 클릭하여 50문항 탐색";
  }
  if(q){
    viewTopic.classList.remove("on");
    viewHome.classList.add("on");
    answerEl.classList.remove("on");
    currentTopicId=null;
    panelToggles.forEach(({btn, panel})=>closeWisdomPanel(btn, panel));
  }
}
function closeModal(){
  modalOverlay.classList.remove("on");
  document.body.style.overflow = "";
}
safeOn(modalClose, "click", closeModal);
safeOn(modalOverlay, "click", e=>{ if(e.target===modalOverlay) closeModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
safeOn(modalSearch, "click", ()=>{
  if(modalKeyword){
    closeModal();
    setSearch(modalKeyword);
    searchInput.focus();
    searchInput.scrollIntoView({behavior:"smooth",block:"center"});
  }
});

function shortText(s, max){
  if(!s) return "";
  return s.length > max ? s.slice(0, max) + "…" : s;
}

function dedupeByKey(items, key){
  const seen = new Set();
  return (items||[]).filter(item=>{
    const k = String(item[key]||"").trim();
    if(!k || seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

function renderQuotes(){
  if(!quotesEl || typeof FEYNMAN_QUOTES==="undefined") return;
  quotesEl.innerHTML="";
  dedupeByKey(FEYNMAN_QUOTES,"text").forEach((q,i)=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="wisdom-item quote-item";
    btn.textContent = (i+1) + ". " + shortText(q.text, 28);
    btn.title = q.text;
    const kw=(q.keywords||[])[0]||q.text.slice(0,4);
    btn.addEventListener("click",()=>openModal(q.text, "— " + (q.source||"파인만"), q.detail||q.text, kw, "quote", false));
    quotesEl.appendChild(btn);
  });
}

function renderTerms(){
  if(!termsEl || typeof KEY_TERMS==="undefined") return;
  termsEl.innerHTML="";
  dedupeByKey(KEY_TERMS,"term").forEach((t,i)=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="wisdom-item term-item";
    btn.innerHTML = `<b>${i+1}.</b> ${escapeHTML(t.term)}`;
    btn.title = t.desc || t.term;
    const kw=(t.keywords||[])[0]||t.term;
    btn.addEventListener("click",()=>openModal(t.term, t.desc||"", t.detail||t.desc||"", kw, "term", false));
    termsEl.appendChild(btn);
  });
}

function renderKnowhow(){
  if(!knowhowEl || typeof FEYNMAN_KNOWHOW==="undefined") return;
  knowhowEl.innerHTML="";
  dedupeByKey(FEYNMAN_KNOWHOW,"title").forEach((k,i)=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="wisdom-item knowhow-item";
    btn.textContent = (i+1) + ". " + shortText(k.title, 24);
    btn.title = k.summary || k.title;
    const kw=(k.keywords||[])[0]||k.title.slice(0,4);
    btn.addEventListener("click",()=>openModal(k.title, k.summary||"", k.detail||k.summary||"", kw, "knowhow", false));
    knowhowEl.appendChild(btn);
  });
}

function renderStories(){
  if(!storiesEl || typeof FEYNMAN_STORIES==="undefined") return;
  storiesEl.innerHTML="";
  dedupeByKey(FEYNMAN_STORIES,"title").forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="wisdom-item story-item";
    btn.textContent = (i+1) + ". " + shortText(s.title, 26);
    btn.title = s.summary || s.title;
    const kw=(s.keywords||[])[0]||s.title.slice(0,4);
    btn.addEventListener("click",()=>openModal(s.title, s.summary||"", s.detail||s.summary||"", kw, "story", false));
    storiesEl.appendChild(btn);
  });
}

function escapeHTML(s){
  return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

function startLoading(){
  if(errEl) errEl.classList.remove("on");
  if(answerEl) answerEl.classList.remove("on");
  if(loadingEl) loadingEl.classList.add("on");
  let i=0; loadingMsg.textContent=LOADING_MSGS[0];
  loadingTimer=setInterval(()=>{i=(i+1)%LOADING_MSGS.length;loadingMsg.textContent=LOADING_MSGS[i];},1400);
}
function stopLoading(){
  if(loadingEl) loadingEl.classList.remove("on");
  clearInterval(loadingTimer);
}

function renderAnswer(data, question){
  qEcho.textContent=question;
  qCat.textContent=data.category ? `분야 · ${data.category}` : "";
  blocksEl.innerHTML="";
  BLOCK_DEF.forEach((def,idx)=>{
    const txt=(data[def.key]||"").trim();
    if(!txt) return;
    const wrap=document.createElement("div");
    wrap.className=`block ${def.cls}`;
    wrap.style.animationDelay=(idx*0.12)+"s";
    wrap.innerHTML=`
      <div class="b-label"><span class="num">${idx+1}</span>${def.label}</div>
      <div class="b-body">${escapeHTML(txt)}</div>`;
    blocksEl.appendChild(wrap);
  });
  answerEl.classList.add("on");
  answerEl.scrollIntoView({behavior:"smooth",block:"start"});
}

async function showAnswer(question, answer){
  startLoading();
  await new Promise(r=>setTimeout(r,900));
  stopLoading();
  renderAnswer(answer, question);
}

function showHome(){
  viewTopic.classList.remove("on");
  viewHome.classList.add("on");
  answerEl.classList.remove("on");
  currentTopicId = null;
  renderHome();
}

function showTopic(topicId){
  const topic = getTopicById(topicId);
  if(!topic) return;
  currentTopicId = topicId;
  viewHome.classList.remove("on");
  viewTopic.classList.add("on");
  answerEl.classList.remove("on");
  topicHead.innerHTML=`
    <div class="t-emoji">${topic.emoji}</div>
    <h2>${escapeHTML(topic.name)}</h2>
    <p>${escapeHTML(topic.desc)} · ${topic.questions.length}개 질문</p>`;
  renderQuestionList(topic);
  viewTopic.scrollIntoView({behavior:"smooth",block:"start"});
}

function keywordMatches(keyword, query){
  const k=keyword.toLowerCase();
  const q=query.toLowerCase();
  if(!q) return true;
  if(k===q) return true;
  if(q.length>=2 && (k.includes(q)||q.includes(k))) return true;
  return false;
}
function textMatches(text, query){
  const t=text.toLowerCase();
  const q=query.toLowerCase();
  if(!q) return true;
  if(q.length===1){
    let i=t.indexOf(q);
    while(i!==-1){
      const next=t[i+1];
      if(!next||!/[\uac00-\ud7a3]/.test(next)) return true;
      i=t.indexOf(q,i+1);
    }
    return false;
  }
  return t.includes(q);
}

function itemMatchesQuery(item, topic, q){
  if(!q) return true;
  if((item.keywords||[]).some(k=>keywordMatches(k,q))) return true;
  if(textMatches(item.q,q)) return true;
  if((topic.keywords||[]).some(k=>keywordMatches(k,q))) return true;
  if(textMatches(topic.name,q)) return true;
  return false;
}

function renderQuestionList(topic){
  questionList.innerHTML="";
  const q = searchQuery.trim();
  topic.questions.forEach((item,idx)=>{
    const hit = itemMatchesQuery(item, topic, q);
    const btn=document.createElement("button");
    btn.className="q-item"+(q?(hit?" match":" dim"):"");
    btn.innerHTML=`
      <span class="q-num">${idx+1}</span>
      <span class="q-text">${escapeHTML(item.q)}</span>`;
    btn.addEventListener("click",()=>{
      if(isSearchActive()) openAnswerModal(item.q,item.answer);
      else showAnswer(item.q,item.answer);
    });
    questionList.appendChild(btn);
  });
}

function renderTopicGrid(topics){
  topicGrid.innerHTML="";
  const q = searchQuery.trim();
  let shown = 0;
  topics.forEach(t=>{
    if(q && !t.active) return;
    shown++;
    const topic=getTopicById(t.id)||t;
    const card=document.createElement("button");
    card.className="topic-card"+(q?" match":"");
    card.innerHTML=`
      <div class="t-emoji">${t.emoji}</div>
      <div class="t-name">${escapeHTML(t.name)}</div>
      <div class="t-desc">${escapeHTML(t.desc)}</div>
      <div class="t-count">${q?t.matchCount+"개 일치":(topic.questions?topic.questions.length:50)+"개 질문"}</div>`;
    card.addEventListener("click",()=>{
      if(isSearchActive()) setSearch("");
      showTopic(t.id);
    });
    topicGrid.appendChild(card);
  });
  if(q && shown===0){
    topicGrid.innerHTML='<p class="search-empty">일치하는 카테고리가 없습니다.</p>';
  }
}

function renderSearchResults(){
  if(searchResults){
    searchResults.classList.remove("on");
    searchResults.innerHTML="";
  }
}

function renderHome(){
  const {topics}=searchItems(searchQuery);
  renderTopicGrid(topics);
  renderSearchResults();
  if(currentTopicId){
    const topic=getTopicById(currentTopicId);
    if(topic) renderQuestionList(topic);
  }
}

safeOn(searchInput, "input", e=>{
  searchQuery=e.target.value;
  updateSearchMode();
  if(currentTopicId && !isSearchActive()){
    const topic=getTopicById(currentTopicId);
    if(topic) renderQuestionList(topic);
  }
  const {topics}=searchItems(searchQuery);
  renderTopicGrid(topics);
  renderSearchResults();
});

safeOn(backBtn, "click", showHome);
safeOn(redoBtn, "click", ()=>{
  answerEl.classList.remove("on");
  if(currentTopicId) showTopic(currentTopicId);
  else showHome();
});

renderQuotes();
renderTerms();
renderKnowhow();
renderStories();

if(!dataReady()){
  showBootError(`<b>데이터 파일을 불러오지 못했습니다.</b><br>
    <code>index.html</code>과 <code>knowledge-data.js</code>를 <b>같은 폴더</b>에 두세요.<br>
    PC에서는 <code>PC에서-열기.bat</code>으로 여는 것이 안정적입니다.`);
}else{
  try{
    renderHome();
  }catch(err){
    console.error(err);
    showBootError(`<b>초기화 오류</b><br>${err.message||err}`);
  }
}
}

try{ main(); }catch(err){
  console.error(err);
  showBootError(`<b>실행 오류</b><br>${err.message||err}`);
}
</script>
</body>
</html>
